<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de ML Prática</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1 class="title">🔥 QUEIMADOR DE CALORIAS 🔥</h1>
            
            <div style="text-align: center; margin-bottom: 30px;">
                <img 
                    src="logo.png" 
                    alt="Logo" 
                    style="max-width: 120px; width: 100%; height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.5));"
                >
            </div>
            
            <form class="form">
                <div class="form-group">
                    <label class="label">Minutos de Exercício</label>
                    <input 
                        type="number" 
                        id="minutos" 
                        class="input" 
                        placeholder="Ex: 30"
                        min="0"
                        step="0.5"
                    >
                </div>

                <button type="button" class="button" onclick="treinarEPrever()">
                    Treinar IA & Prever
                </button>
            </form>

            <div style="margin-top: 30px; text-align: center;">
                <h3 id="status" style="color: #00ffff; text-shadow: 0 0 5px #00ffff; font-size: 14px;">Status: Aguardando...</h3>
                <h2 id="resultado" style="color: #ff00ff; text-shadow: 0 0 10px #ff00ff; margin-top: 20px;"></h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
